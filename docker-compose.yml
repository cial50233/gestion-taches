services:
  php:
    build: .
    container_name: symfony-php
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - .:/app
    tty: true

  db:
    image: postgres:16
    container_name: symfony-db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: